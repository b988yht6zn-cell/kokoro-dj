# Sonna Spins — Ilaiyaraja / MSV Tamil DJ config
# Rename this file and edit to create your own DJ personality

name: "Sonna Spins"
artist: "Ilaiyaraja"

# ── Audio device setup (macOS) ─────────────────────────────────────────────────
audio:
  # Wake-on-LAN — wakes Bose Soundbar 700 from standby without triggering HDMI CEC (TV stays off)
  wol_mac: "4c:87:5d:b2:62:8e"
  wol_wait: 8.0                   # seconds to wait after WOL before switching audio
  # AirPlay device name as registered in macOS CoreAudio
  # NOTE: Bose Soundbar 700 registers as "AirPlay" — NOT "Bose Soundbar 700"
  # Run: SwitchAudioSource -a -t output  to see your device names
  # One-time setup: select the device once in System Settings → Sound → Output
  airplay_device: "AirPlay"
  volume: 16                      # startup volume (0–100)

# ── Auto-queue sources (used when no file queue is active) ────────────────────
# Mix of YouTube playlist IDs (PL...) and search queries.
# Playlist IDs from official Ilaiyaraja channel (@IlaiyaraajaOfficial) — verify periodically.
sources:
  - "PL89t04T3yNyZc3a5W8ASoSH5Z9MAaAlnN"   # SPB hits
  - "PL89t04T3yNyaFHAS5QwT2xzw9OhDTDrXG"   # Rajinikanth hits
  - "PL89t04T3yNyYM5Fx3wMJa-GTufP2i3HaO"   # Kamal Haasan hits
  - "PL89t04T3yNyZDgD5FZLHf3Wx1wrC9Rqbr"   # Mohan hits
  - "PL89t04T3yNybLy_iHb9zEeoGBqBKuHZPX"   # Evergreen hits
  - "Ilaiyaraja SPB 1980s Tamil hit songs HD official"
  - "Ilaiyaraja peppy dance songs Tamil 80s official"

# ── LLM configuration ──────────────────────────────────────────────────────────
llm:
  provider: openai          # openai-compatible endpoint
  model: claude-sonnet-4-6
  api_key_env: HERMES_API_KEY
  base_url: http://127.0.0.1:8642/v1

# ── TTS configuration ──────────────────────────────────────────────────────────
tts:
  backend: sarvam        # sarvam | kokoro
  language: ta-IN        # ta-IN for Tamil, en-IN for Indian English
  speaker: anushka       # Sarvam: anushka, manisha, vidya, arya | Kokoro: bm_george, af_heart
  pace: 0.80             # Speech pace (0.6 slow — 1.0 normal)
  pitch: 0.0             # Pitch adjustment (-1.0 to 1.0). Keep 0.0–0.1 for natural sound.
  pause_between: 0.5     # Silence in seconds between intro chunks

# Welcome message played at startup
welcome_message: "வணக்கம்! இளையராஜாவின் இசையோடு இந்த நேரத்தை கொண்டாடுவோம். சோனா ஸ்பின்ஸில் உங்களை வரவேற்கிறோம்!"

