# TTS configuration
tts:
  backend: sarvam        # sarvam | kokoro
  language: ta-IN        # ta-IN for Tamil, en-IN for Indian English
  speaker: anushka       # Sarvam: anushka, manisha, vidya, arya | Kokoro: bm_george, af_heart
  pace: 0.80             # Speech pace (0.6 slow — 1.0 normal — 1.2 fast)
  pitch: 0.0             # Pitch adjustment (-1.0 to 1.0)
  pause_between: 0.5     # Silence in seconds between intro chunks

# Welcome message played at startup
welcome_message: "வணக்கம்! இளையராஜாவின் இசையோடு இந்த நேரத்தை கொண்டாடுவோம். சோனா ஸ்பின்ஸில் உங்களை வரவேற்கிறோம்!"

